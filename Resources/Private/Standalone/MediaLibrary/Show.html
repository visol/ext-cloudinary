<button
        id="btn-{objectGroup}"
        class="btn-cloudinary-media-library btn btn-default open-btn mx-1 btn-open-cloudinary btn-open-cloudinary-storage-{cloudinaryCredentials.storageUid}"
        data-cloudinary-credentials="{cloudinaryCredentials -> f:format.json()}"
        data-object-group="{objectGroup}"
        disabled
>
    <core:icon identifier="actions-cloud" />
    Image or video from "{cloudinaryCredentials.storageName}"
</button>
